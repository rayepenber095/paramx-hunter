name: ParamX Hunter CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:
  # ── Backend Lint & Type Check ─────────────────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
      - name: Ruff lint
        run: ruff check backend/
      - name: Black format check
        run: black --check backend/
      - name: Mypy type check
        run: mypy backend/ --ignore-missing-imports
        continue-on-error: true

  # ── Backend Unit & Integration Tests ──────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paramx
          POSTGRES_PASSWORD: paramx
          POSTGRES_DB: paramx_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install aiosqlite
      - name: Run unit tests
        run: pytest backend/tests/unit -v --cov=backend --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://paramx:paramx@localhost:5432/paramx_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
      - name: Run integration tests
        run: pytest backend/tests/integration -v
        env:
          DATABASE_URL: postgresql+asyncpg://paramx:paramx@localhost:5432/paramx_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Frontend Lint & Build ─────────────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      - name: Type check
        run: npm run type-check
        continue-on-error: true
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ── Security Scanning ──────────────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0
      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt || true

  # ── Docker Build & Push ────────────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Kubernetes ───────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
      - name: Apply manifests
        run: |
          kubectl apply -f k8s/00-namespace-config.yaml
          kubectl apply -f k8s/01-postgres.yaml
          kubectl apply -f k8s/02-redis.yaml
          kubectl apply -f k8s/03-backend.yaml
          kubectl apply -f k8s/04-celery.yaml
          kubectl apply -f k8s/05-frontend-ingress.yaml
      - name: Roll out new images
        run: |
          kubectl set image deployment/paramx-backend backend=ghcr.io/${{ github.repository }}/backend:${{ github.sha }} -n paramx-hunter
          kubectl set image deployment/paramx-celery-worker celery-worker=ghcr.io/${{ github.repository }}/backend:${{ github.sha }} -n paramx-hunter
          kubectl set image deployment/paramx-frontend frontend=ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} -n paramx-hunter
          kubectl rollout status deployment/paramx-backend -n paramx-hunter --timeout=180s
