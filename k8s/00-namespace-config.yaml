apiVersion: v1
kind: Namespace
metadata:
  name: paramx-hunter
  labels:
    app: paramx-hunter

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paramx-config
  namespace: paramx-hunter
data:
  DATABASE_URL: "postgresql+asyncpg://paramx:paramx@postgres-service:5432/paramx"
  REDIS_URL: "redis://redis-service:6379/0"
  CELERY_BROKER_URL: "redis://redis-service:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/2"
  CORS_ORIGINS: '["https://paramxhunter.example.com"]'
  DEFAULT_CONCURRENCY: "50"
  MAX_SCAN_CONCURRENCY: "200"

---
apiVersion: v1
kind: Secret
metadata:
  name: paramx-secrets
  namespace: paramx-hunter
type: Opaque
stringData:
  SECRET_KEY: "REPLACE-WITH-256-BIT-RANDOM-SECRET-IN-PRODUCTION"
  POSTGRES_PASSWORD: "REPLACE-WITH-STRONG-PASSWORD"
  POSTGRES_USER: "paramx"
  POSTGRES_DB: "paramx"
