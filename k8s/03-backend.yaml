apiVersion: apps/v1
kind: Deployment
metadata:
  name: paramx-backend
  namespace: paramx-hunter
  labels:
    app: paramx-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: paramx-backend
  template:
    metadata:
      labels:
        app: paramx-backend
    spec:
      containers:
        - name: backend
          image: paramx-hunter/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: paramx-config }
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef: { name: paramx-secrets, key: SECRET_KEY }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: paramx-backend-service
  namespace: paramx-hunter
spec:
  selector:
    app: paramx-backend
  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: paramx-backend-hpa
  namespace: paramx-hunter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: paramx-backend
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
