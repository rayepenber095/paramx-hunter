services:
  postgres:
    image: postgres:16-alpine
    container_name: paramx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: paramx
      POSTGRES_PASSWORD: paramx
      POSTGRES_DB: paramx
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paramx"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: paramx-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: paramx-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://paramx:paramx@postgres:5432/paramx
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-256-bit-key}
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: paramx-celery-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://paramx:paramx@postgres:5432/paramx
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-256-bit-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: celery -A backend.workers.scan_worker.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: paramx-celery-beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://paramx:paramx@postgres:5432/paramx
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-256-bit-key}
    depends_on:
      - redis
    volumes:
      - ./backend:/app/backend
    command: celery -A backend.workers.scan_worker.celery_app beat --loglevel=info

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: paramx-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: paramx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
