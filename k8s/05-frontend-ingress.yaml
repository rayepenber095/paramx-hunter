apiVersion: apps/v1
kind: Deployment
metadata:
  name: paramx-frontend
  namespace: paramx-hunter
  labels:
    app: paramx-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: paramx-frontend
  template:
    metadata:
      labels:
        app: paramx-frontend
    spec:
      containers:
        - name: frontend
          image: paramx-hunter/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: paramx-frontend-service
  namespace: paramx-hunter
spec:
  selector:
    app: paramx-frontend
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paramx-ingress
  namespace: paramx-hunter
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: "paramx-backend-service"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["paramxhunter.example.com"]
      secretName: paramx-tls
  rules:
    - host: paramxhunter.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: paramx-backend-service
                port: { number: 8000 }
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: paramx-backend-service
                port: { number: 8000 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: paramx-frontend-service
                port: { number: 80 }
